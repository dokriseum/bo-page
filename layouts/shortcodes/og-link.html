{{- $ogData := .Site.Data.opengraph -}}
{{- $url := .Get "url" -}}

{{- with index $ogData $url -}}
<div class="event-list-item" style="flex-direction: column; align-items: stretch; max-width: 600px;" onclick="window.open('{{ .url }}', '_blank')">
  <div style="display: flex; gap: 16px; align-items: flex-start;">
    {{- if .image -}}
    <div class="" style="width: 80px; height: 80px; aspect-ratio: 1/1;">
      <img src="{{ .image }}" 
           alt="{{ if index . "image:alt" }}{{ index . "image:alt" }}{{ else }}{{ .title }}{{ end }}" 
           class="event-list-bg-image"
           style="object-fit: cover;"
           loading="lazy">
    </div>
    {{- end -}}
    
    <div class="event-list-info" style="flex: 1;">
      <h4>{{ .title | default .domain }}</h4>
      {{- if .description -}}
      <p style="font-size: 14px; color: var(--text-light); margin-top: 4px; line-height: 1.4;">{{ .description }}</p>
      {{- end -}}
    </div>
  </div>

  <div style="margin-top: 12px; padding: 12px; border-top: 1px solid var(--border); font-size: 13px; color: var(--diversity-blue); background-color: hsl(from var(--secondary) h s 90%);">
    🔗 {{ .domain }}
  </div>
</div>
{{- else -}}
<a href="{{ $url }}" target="_blank" rel="noopener" class="section-link" style="display: inline-block; padding: 8px 16px; border: 2px solid var(--border); border-radius: 8px;">
  {{ $url }}
</a>
{{- end -}}
