{{- $ogData := .Site.Data.opengraph -}}

<div class="grid gap-4 md:grid-cols-2 lg:grid-cols-3">
  {{- range $url, $data := $ogData -}}
  <div class="border rounded-lg p-4 hover:shadow-lg transition-shadow">
    {{- if $data.image -}}
    <img src="{{ $data.image }}" alt="{{ $data.title }}" class="w-full h-48 object-cover rounded-md mb-3">
    {{- end -}}
    
    <h3 class="text-lg font-bold mb-2">
      <a href="{{ $data.url }}" target="_blank" rel="noopener" class="hover:text-green-600">
        {{ $data.title | default $data.domain }}
      </a>
    </h3>
    
    {{- if $data.description -}}
    <p class="text-sm text-gray-600 mb-2 line-clamp-3">{{ $data.description }}</p>
    {{- end -}}
    
    <p class="text-xs text-gray-400">{{ $data.domain }}</p>
  </div>
  {{- end -}}
</div>
