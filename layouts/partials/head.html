<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ if .Title }}{{ .Title }} | {{ end }}{{ site.Title }}</title>

{{ $css := resources.Get "css/app.css" | css.PostCSS | resources.Minify | resources.Fingerprint }}
<script>
    (function () {
        const key = 'bo-theme';
        const stored = localStorage.getItem(key);
        const system = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        const theme = stored || system;
        document.documentElement.setAttribute('data-theme', theme);
        // PWA/Browser-chrome anpassen
        const meta = document.querySelector('meta[name="theme-color"]') ||
            document.head.appendChild(Object.assign(document.createElement('meta'), {name:'theme-color'}));
        meta.content = theme === 'dark' ? '#121212' : '#f8f9fa';
    })();
</script>

<link rel="stylesheet" href="{{ $css.RelPermalink }}">
