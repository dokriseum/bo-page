<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Events Admin Page</title>
  <style>
    body { font-family: sans-serif; margin: 2em; }
    .dev { color: #b00; font-weight: bold; }
    ul { list-style: none; padding: 0; }
    li { margin-bottom: 0.5em; }
    .actions { margin-top: 1em; }
  </style>
</head>
<body>
  <h1 class="dev">Event-Admin</h1>
  <div style="display: flex; gap: 2em; align-items: flex-start; width: 100%;">
    <div style="flex: 1 1 0; min-width: 300px;">
      <div class="actions">
        <button id="download-btn">Download ausgewählte Events als events.json</button>
      </div>
      <ul id="event-list"></ul>
    </div>
    <div style="flex: 1 1 0; min-width: 300px; border: 1px solid #ccc; padding: 1em; background: #f7f7f7;">
      <h2>Neue Events hinzufügen</h2>
      <textarea id="add-json" rows="10" style="width: 100%; font-family: monospace;"></textarea>
      <div id="json-lint-msg" style="margin: 0.5em 0; color: #b00;"></div>
      <form id="add-form" onsubmit="return false;">
        <div id="json-preview" style="background: #fff; border: 1px solid #eee; padding: 0.5em; margin-bottom: 0.5em;"></div>
        <button id="add-btn" disabled>Events hinzufügen</button>
      </form>
    </div>
  </div>
  <script src="/dev-event-tools/events-lib.js"></script>
  <script>
    (async function() {
      const eventManager = new EventManager('/events.json');
      await eventManager.loadEvents();
      const eventUI = new EventUI(eventManager, '#event-list', null);
      document.getElementById('download-btn').addEventListener('click', () => {
        const selected = Array.from(eventUI.selectedIndices).sort((a, b) => a - b);
        const allEvents = eventManager.getEvents();
        const selectedEvents = selected.map(idx => allEvents[idx]);
        const blob = new Blob([JSON.stringify(selectedEvents, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'events.json';
        document.body.appendChild(a);
        a.click();
        setTimeout(() => {
          document.body.removeChild(a);
          URL.revokeObjectURL(url);
        }, 100);
      });

      const textarea = document.getElementById('add-json');
      const lintMsg = document.getElementById('json-lint-msg');
      const preview = document.getElementById('json-preview');
      const addBtn = document.getElementById('add-btn');
      let parsed = null;
      function updatePreview() {
        const val = textarea.value.trim();
        if (!val) {
          lintMsg.textContent = '';
          preview.innerHTML = '';
          addBtn.disabled = true;
          parsed = null;
          return;
        }
        const result = window.parseAndPreviewEvents(val);
        if (result.valid) {
          lintMsg.textContent = '';
          // Checkboxen für jedes Event
          parsed = result.events;
          preview.innerHTML = parsed.map((ev, i) =>
            `<div style="margin-bottom:0.5em; border-bottom:1px solid #eee;">
              <label>
                <input type='checkbox' class='add-preview-checkbox' data-idx='${i}' checked>
                <strong>${ev.Title || 'No title'}</strong><br>
                <span>${ev.Time ? new Date(ev.Time).toLocaleDateString() : ''}</span><br>
                <span>${ev.Location || ''}</span>
              </label>
            </div>`
          ).join('');
          addBtn.disabled = false;
        } else {
          lintMsg.textContent = result.error;
          preview.innerHTML = '';
          addBtn.disabled = true;
          parsed = null;
        }
      }
      textarea.addEventListener('input', updatePreview);

      document.getElementById('add-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        if (!parsed) return;
        // Finde alle angehakten Checkboxen
        const checked = Array.from(document.querySelectorAll('.add-preview-checkbox:checked'));
        if (checked.length === 0) return;
        const indices = checked.map(cb => parseInt(cb.getAttribute('data-idx'), 10));
        const toAdd = indices.map(i => parsed[i]);
        try {
          eventManager.addEventsToList(toAdd);
          await eventUI.renderList();
          textarea.value = '';
          updatePreview();
        } catch (err) {
          lintMsg.textContent = err.message;
        }
      });
    })();
  </script>
</body>
</html>
