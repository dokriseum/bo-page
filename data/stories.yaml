- name: "Anja"
  location: "--"
  age: --
  excerpt: "Als die Freiheitsrevolution siegte, kamen auch ganz schnell weitaus größere Mülleimer ins eigene Leben, das musste erst alles neu geordnet werden und begriffen werden, was da alles falsch läuft."
  fullText: "Ich kann mich auch noch erinnern an einen kleinen Schock 1987: Wir feierten in Schöneiche (am Rande von Berlin-Friedrichshagen gelegen) auf einem Pfarrhof eine Hochzeit von Freundin*innen, große Sache - das gesamte Essen und Trinken wurde von Verwandten aus West-Berlin angefahren. Das gefiel uns. Wir staunten, das die Transporter übervoll mit allem Möglichen waren - nach drei Tagen Feier staunten wir noch mehr. Immer wieder redeten wir uns die Köpfe heiß über Ökologie, was wir selbst machen könnten, besser leben, lasen einschlägige Westbücher etc. Und dann war die Feier zu Ende, wir räumten auf und die Autops fuhren  gen Westen genauso vollgepackt wie auf der Hinfahrt - nun aber alles voller Müll. Ich weiß bis heute noch, wie sprachlos nicht nur ich war und wir begriffen, was jeder selbst tun könne. Das dauerte aber - als die Freiheitsrevolution siegte, kamen auch ganz schnell weitaus größere Mülleimer ins eigene Leben, das musste erst alles neu geordnet werden und begriffen werden, was da alles falsch läuft.

Ich habe ein schwieriges Gefühl bei den Erinnerungen an unsere „nachhaltigen Vorfahren“. In meinem thüringer Dorf, in meiner Familie, wurden Schweine, Hühner und Hasen geschlachtet, weil es am DDR Rand nix zu kaufen gab und ja da wurde alles verwertet. Wie diese Tiere gehalten wurden, daran will ich überhaupt nicht mehr denken. Und es war bis vor wenigen Jahren absolut üblich den Müll, dessen Entsorgung zusätzlich Geld gekostet hätte, an einen geheimen Ort im Wald zu fahren. Und über Dünger - egal welcher Art - waren alle heilfroh. War das denn woanders wirklich so anders?"

- name: "Frederike"
  location: "--"
  age: --
  excerpt: "Und dann diese über Generationen und 2 Diktaturen erlernte Hilflosigkeit gegenüber denen da oben"
  fullText: "Und dann diese über Generationen und 2 Diktaturen erlernte Hilflosigkeit gegenüber \"denen da oben\". Ich bin in Distanz zum DDR System aufgewachsen. Musste  ergo ab Schuleintritt lernen, mich gegen div. Sorten Übergriffigkeit \"von oben\" zu wehren, vor allen anderen. Das waren auch Selbstwirksamkeitserfahrungen, die ich 1989ff meinen Mitschüler*innen voraus hatte. Mitläufer dagegen meckerten zu DDR Zeiten leise und privat auf die da oben und die Verhältnisse. Heute geht das ohne Konsequenzen laut und öffentlich und kostet die Meckerer nix, nur uns alle die Demokratie."
  image: "/images/stories/maria.jpg"
  image-alt-text: "Bild von Frederike by Lisa S."

