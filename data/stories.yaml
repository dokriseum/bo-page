  excerpt: "In der DDR geboren, meine Eltern mussten sich komplett neu orientieren, da die Betriebe geschlossen/abgewickelt wurden. Das war eine enorme Kraftanstrengung und ja, ..."
  fullText: "In der DDR geboren, meine Eltern mussten sich komplett neu orientieren, da die Betriebe geschlossen/abgewickelt wurden. Das war eine enorme Kraftanstrengung und ja, sie wurden gerade durch dieses kämpfen für uns (ihre Kinder) zu meinem Vorbild. Alles was sie heute besitzen, haben sie sich erarbeitet, nichts geerbt. Meine Schwester und ich sind heute studierte Beamte in Führungspositionen. Meine Schwester engagiert sich bei den Grünen in Hannover. Ja, wir sind beide ostdeutsche Aufsteigerkinder😊"

- name: "Sebastian"
  location: ""
  age: --
  excerpt: "Ich bin ein paar Jahre jünger, aber auch ich saß mit 13 bei der Stasi und nachdem sie mir (mit 13!!!) eine Kenton rot angeboten haben..."
  fullText: "Ich bin ein paar Jahre jünger, aber auch ich saß mit 13 bei der Stasi und nachdem sie mir (mit 13!!!) eine Kenton rot angeboten haben und ich dankend ablehnte, und sie mir prophezeiten, dass ich so keine Zukunft hätte, da war mir auch damals klar: ich bin in diesem System am Arsch. Meine ältere Schwester war damals mit den Leuten von der Ossietzky befreundet. Auch da kam „Besuch“ nach Hause und die Bildungsmöglichkeiten waren fortan eingeschränkt. Diese wachsende Form der Verklärung (massiv bei der Nachkriegs-Generation meiner Eltern) grenzt an Realitätsverweigerung. Wie auch die wieder zunehmende Akzeptanz der Linken, eine Partei die sich nie von ihrem Ursprung der SED distanzierte, inkl Personenkult um Gysi."


- name: "Grit"
  location: ""
  age: --
  excerpt: "Ich bin geboren in einem Land, das es nicht mehr gibt. Ich liebe mein Deutschland. Aber ich werde niemals wieder irgendwo zuhause sein. ..."
  fullText: "„Ich bin geboren in einem Land, das es nicht mehr gibt. Ich liebe mein Deutschland. Aber ich werde niemals wieder irgendwo zuhause sein.„ Das Gefühl, keinen festen Platz mehr zu haben, kann tiefsitzend und lebenslang bleiben. „Frühkindliche Prägungen dauern ein Leben lang, und sie erfordern tagtägliches mühsames Dagegen-Ankämpfen.„ Selbst nach dem politischen Umbruch verschwindet die innere Prägung nicht. „Deshalb SIND wir verschieden. Und bleiben es. Und auch unsere Kinder werden noch verschieden sein, denn WIR ziehen sie auf.„ Selbst alltägliche Eindrücke lösen Erinnerungen aus: „Wenn ein Trabant vor mir herfährt und stinkt, dann riecht es nach Heimat. Ob ich will oder nicht.„ Auch die Freiheit nach der Wende fühlte sich für viele erst mal fremd an: „Die kamen auch nicht so recht klar mit Freiheit. Und nein: Das geht nicht mit der Zeit weg.„ So bleibt die Prägung durch die Diktatur spürbar – und auch die Generationen nach 1989 tragen sie noch still und unbewusst in sich."


- name: "Katja"
  location: ""
  age: --
  excerpt: "Man hat ihre Pension um einen sog. „Ruhensbetrag“ gekürzt, von dem auch Verwaltungs-Fachanwälte nicht erklären konnten, worauf der beruht. ..."
  fullText: "Ich erinnere mich noch sehr genau an eine extrem kränkende Erfahrung, die meine Mutter machen musste, als sie nach 2000 in Pension ging. Sie war Lehrerin und Schulleiterin, musste sich mit weit über 50 noch Prüfungen unterziehen, um wie ihren West-Kollegen adäquat befördert werden zu können. Mal davon abgesehen, dass es ziemlich entwürdigend war, über 30 Jahre Erfahrung als Lehrkraft anzuzweifeln, weil jemand diese 30 Jahre im Osten gearbeitet hatte, war es dann die Krönung, als sie mit 65 pensioniert wurde. Man hat ihre Pension um einen sog. „Ruhensbetrag“ gekürzt, von dem auch Verwaltungs-Fachanwälte nicht erklären konnten, worauf der beruht. Und als sie dann beim zuständigen Landesverwaltungsamt nachfragte, wurde ihr original geantwortet „Sagen Sie doch gleich, dass Sie am 3.Oktober 1990 im Osten gelebt haben!“. Damit war die Sache erledigt und sie empfindet es bis heute als Ost-Stigmatisierung. Ich kann es ihr nicht verdenken, denn während ich 1990 20 Jahre alt war und noch zwei neue Ausbildungen gemacht habe, war meine Mutter damals 50. Im Übrigen nicht das einzige Mal, dass ich in Gesetzen gelesen habe, dass es für bestimmte Dinge darauf ankam, wo man am 3.10.1990 seinen Wohnsitz hatte."